name: GameTests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gametests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gametests:
    name: Run GameTests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run GameTests
        run: ./gradlew --no-daemon --stacktrace runGameTestServer

      - name: Upload GameTest logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gametest-logs-${{ github.run_id }}
          path: run/gametestserver/logs/
          if-no-files-found: warn
          retention-days: 7
